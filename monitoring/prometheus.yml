global:
  scrape_interval: 15s

# This is intentionally minimal:
# - In real environments, Prometheus runs in Kubernetes and discovers targets via Service discovery.
# - For this demo, we show the scrape pattern and provide /metrics endpoints in each service.
scrape_configs:
  - job_name: "search-service"
    static_configs:
      - targets: ["search-service:5000"]

  - job_name: "booking-service"
    static_configs:
      - targets: ["booking-service:5000"]

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:5000"]



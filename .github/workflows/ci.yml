name: ci

on:
  push:
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: |
          docker build -t travel-demo/search-service:ci ./services/search-service
          docker build -t travel-demo/booking-service:ci ./services/booking-service
          docker build -t travel-demo/payment-service:ci ./services/payment-service

      - name: Run stack
        run: |
          docker compose up -d --build

      - name: Smoke test
        run: |
          set -e
          # give containers a moment to start
          sleep 3
          curl -fsS http://localhost:5001/health
          curl -fsS http://localhost:5002/health
          curl -fsS http://localhost:5003/health

      - name: Logs on failure
        if: failure()
        run: |
          docker compose logs --no-color

      - name: Tear down
        if: always()
        run: |
          docker compose down -v


